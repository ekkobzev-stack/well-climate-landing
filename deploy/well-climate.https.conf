server {
    listen 80;
    listen [::]:80;
    server_name well-climate.ru;
    location ^~ /.well-known/acme-challenge/ { root /var/www/well-climate/current/dist/client; try_files $uri =404; }
    location / { return 301 https://well-climate.ru$request_uri; }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.well-climate.ru;
    location ^~ /.well-known/acme-challenge/ { root /var/www/well-climate/current/dist/client; try_files $uri =404; }
    location / { return 301 https://well-climate.ru$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.well-climate.ru;
    ssl_certificate /etc/letsencrypt/live/well-climate.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/well-climate.ru/privkey.pem;
    return 301 https://well-climate.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name well-climate.ru;

    ssl_certificate /etc/letsencrypt/live/well-climate.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/well-climate.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/well-climate/current/dist/client;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location ~* \.(?:css|js|mjs|woff2?|svg|png|jpe?g|gif|webp|ico)$ {
        try_files $uri @app;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location @app {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
